joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 50

horizontal_velocity_controller:
  type: velocity_controllers/JointVelocityController
  joint: horizontal_slider_joint
  pid: {p: 50.0, i: 10.0, d: 5.0, i_clamp_min: -20.0, i_clamp_max: 20.0}

vertical_velocity_controller:
  type: velocity_controllers/JointVelocityController
  joint: vertical_lift_joint
  # 保持 i=0，无积分，避免夹紧为零的歧义
  pid: {p: 600.0, i: 0.0, d: 20.0}

left_finger_velocity_controller:
  type: velocity_controllers/JointVelocityController
  joint: left_finger_joint
  pid: {p: 30.0, i: 5.0, d: 2.0, i_clamp_min: -10.0, i_clamp_max: 10.0}

right_finger_velocity_controller:
  type: velocity_controllers/JointVelocityController
  joint: right_finger_joint
  pid: {p: 30.0, i: 5.0, d: 2.0, i_clamp_min: -10.0, i_clamp_max: 10.0}


